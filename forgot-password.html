<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Shiv Shakti Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --gold: #c9922a;
        --gold-light: #e8b84b;
        --dark: #1a1410;
        --card-bg: #fdf8f2;
        --border: #e8ddd0;
        --text: #3a2e22;
        --muted: #8a7a6a;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--dark);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(201,146,42,0.08) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(201,146,42,0.05) 0%, transparent 50%);
      }

      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 48px 44px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,146,42,0.15);
        animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .brand {
        text-align: center;
        margin-bottom: 36px;
      }

      .brand-icon {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, var(--gold), var(--gold-light));
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        font-size: 24px;
      }

      .brand h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.5px;
      }

      .brand p {
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
        line-height: 1.5;
      }

      .divider {
        width: 40px;
        height: 2px;
        background: linear-gradient(90deg, var(--gold), var(--gold-light));
        margin: 0 auto 28px;
        border-radius: 2px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 13px 16px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        color: var(--text);
        background: #fff;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }

      input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(201,146,42,0.12);
      }

      .field { margin-bottom: 24px; }

      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--gold), var(--gold-light));
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
        letter-spacing: 0.3px;
        margin-top: 4px;
      }

      button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
      button:active:not(:disabled) { transform: translateY(0); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .message {
        margin-top: 20px;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
        display: none;
      }

      .message.success {
        background: #f0faf3;
        color: #2d7a47;
        border: 1px solid #b6e2c6;
        display: block;
      }

      .message.error {
        background: #fff5f5;
        color: #c0392b;
        border: 1px solid #f5c6c6;
        display: block;
      }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
      }

      .back-link:hover { color: var(--gold); }
      .back-link span { margin-right: 4px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-icon">🔑</div>
        <h1>Forgot Password?</h1>
        <p>Enter your admin email and we'll send you a reset link</p>
      </div>
      <div class="divider"></div>

      <div class="field">
        <label for="email">Admin Email</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
      </div>

      <button id="submitBtn" onclick="sendResetLink()">Send Reset Link</button>

      <div id="message" class="message"></div>

      <a href="login.html" class="back-link"><span>←</span> Back to Login</a>
    </div>

    <script>
      async function sendResetLink() {
        const email = document.getElementById("email").value.trim();
        const btn = document.getElementById("submitBtn");
        const msgEl = document.getElementById("message");

        msgEl.className = "message";
        msgEl.textContent = "";

        if (!email) {
          msgEl.className = "message error";
          msgEl.textContent = "Please enter your email address.";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
          const res = await fetch("/admin/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          const result = await res.json();

          if (result.success) {
            msgEl.className = "message success";
            msgEl.textContent = "✅ A reset link has been sent. Check your inbox (and spam folder).";
            document.getElementById("email").value = "";
            btn.textContent = "Sent!";
          } else {
            msgEl.className = "message error";
            msgEl.textContent = "❌ " + (result.message || "Something went wrong.");
            btn.disabled = false;
            btn.textContent = "Send Reset Link";
          }
        } catch (err) {
          msgEl.className = "message error";
          msgEl.textContent = "❌ Server error. Make sure the server is running.";
          btn.disabled = false;
          btn.textContent = "Send Reset Link";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("email").addEventListener("keydown", (e) => {
          if (e.key === "Enter") sendResetLink();
        });
      });
    </script>
  </body>
</html>
