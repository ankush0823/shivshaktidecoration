<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Shiv Shakti Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --gold: #c9922a;
        --gold-light: #e8b84b;
        --dark: #1a1410;
        --card-bg: #fdf8f2;
        --border: #e8ddd0;
        --text: #3a2e22;
        --muted: #8a7a6a;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--dark);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(201,146,42,0.08) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(201,146,42,0.05) 0%, transparent 50%);
      }

      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 48px 44px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,146,42,0.15);
        animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .brand {
        text-align: center;
        margin-bottom: 36px;
      }

      .brand-icon {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, var(--gold), var(--gold-light));
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        font-size: 24px;
      }

      .brand h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.5px;
      }

      .brand p {
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
        line-height: 1.5;
      }

      .divider {
        width: 40px;
        height: 2px;
        background: linear-gradient(90deg, var(--gold), var(--gold-light));
        margin: 0 auto 28px;
        border-radius: 2px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .input-wrap {
        position: relative;
      }

      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 13px 44px 13px 16px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        color: var(--text);
        background: #fff;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }

      input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(201,146,42,0.12);
      }

      .toggle-eye {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: var(--muted);
        width: auto;
        padding: 0;
        margin: 0;
      }

      .toggle-eye:hover { color: var(--gold); }

      .field { margin-bottom: 20px; }

      .strength-bar {
        height: 4px;
        border-radius: 4px;
        background: #e8ddd0;
        margin-top: 8px;
        overflow: hidden;
      }

      .strength-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.3s, background 0.3s;
        width: 0%;
      }

      .strength-text {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }

      button[type="button"]:not(.toggle-eye) {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--gold), var(--gold-light));
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
        letter-spacing: 0.3px;
        margin-top: 8px;
      }

      button[type="button"]:not(.toggle-eye):hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      button[type="button"]:not(.toggle-eye):disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .message {
        margin-top: 20px;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
        display: none;
      }

      .message.success {
        background: #f0faf3;
        color: #2d7a47;
        border: 1px solid #b6e2c6;
        display: block;
      }

      .message.error {
        background: #fff5f5;
        color: #c0392b;
        border: 1px solid #f5c6c6;
        display: block;
      }

      /* Invalid token state */
      .invalid-token {
        text-align: center;
        padding: 20px 0;
      }

      .invalid-token .icon { font-size: 48px; margin-bottom: 16px; }
      .invalid-token h2 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 22px;
        color: var(--text);
        margin-bottom: 8px;
      }
      .invalid-token p { color: var(--muted); font-size: 14px; line-height: 1.5; }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
      }

      .back-link:hover { color: var(--gold); }
      .back-link span { margin-right: 4px; }

      #form-section { display: none; }
      #loading-section { text-align: center; padding: 20px 0; color: var(--muted); font-size: 14px; }
      #invalid-section { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-icon">🔒</div>
        <h1>Reset Password</h1>
        <p>Choose a strong new password for your admin account</p>
      </div>
      <div class="divider"></div>

      <!-- Loading state while verifying token -->
      <div id="loading-section">⏳ Verifying your reset link...</div>

      <!-- Invalid token state -->
      <div id="invalid-section" class="invalid-token">
        <div class="icon">⛔</div>
        <h2>Link Expired or Invalid</h2>
        <p>This password reset link has expired or already been used. Reset links are only valid for 15 minutes.</p>
        <a href="forgot-password.html" class="back-link" style="margin-top:20px; display:inline-block; color: var(--gold);">Request a new link →</a>
      </div>

      <!-- The actual reset form (shown after token verified) -->
      <div id="form-section">
        <div class="field">
          <label for="newPassword">New Password</label>
          <div class="input-wrap">
            <input type="password" id="newPassword" placeholder="Min. 6 characters" oninput="checkStrength()" />
            <button class="toggle-eye" onclick="toggleVisibility('newPassword', this)" type="button">👁️</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-text" id="strength-text"></div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirmPassword" placeholder="Re-enter password" />
            <button class="toggle-eye" onclick="toggleVisibility('confirmPassword', this)" type="button">👁️</button>
          </div>
        </div>

        <button type="button" id="submitBtn" onclick="resetPassword()">Reset Password</button>

        <div id="message" class="message"></div>
      </div>

      <a href="login.html" class="back-link"><span>←</span> Back to Login</a>
    </div>

    <script>
      // Get token from URL query param
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      // On page load — verify token with server
      window.addEventListener("DOMContentLoaded", async () => {
        if (!token) {
          showInvalid();
          return;
        }

        try {
          const res = await fetch(`/admin/reset-password/${token}`);
          const result = await res.json();

          if (result.success) {
            document.getElementById("loading-section").style.display = "none";
            document.getElementById("form-section").style.display = "block";
          } else {
            showInvalid();
          }
        } catch (err) {
          showInvalid();
        }
      });

      function showInvalid() {
        document.getElementById("loading-section").style.display = "none";
        document.getElementById("invalid-section").style.display = "block";
      }

      function toggleVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "🙈";
        } else {
          input.type = "password";
          btn.textContent = "👁️";
        }
      }

      function checkStrength() {
        const val = document.getElementById("newPassword").value;
        const fill = document.getElementById("strength-fill");
        const text = document.getElementById("strength-text");

        let strength = 0;
        if (val.length >= 6) strength++;
        if (val.length >= 10) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;

        const levels = [
          { pct: "0%",   color: "",        label: "" },
          { pct: "25%",  color: "#e74c3c", label: "Weak" },
          { pct: "50%",  color: "#e67e22", label: "Fair" },
          { pct: "75%",  color: "#f1c40f", label: "Good" },
          { pct: "90%",  color: "#2ecc71", label: "Strong" },
          { pct: "100%", color: "#27ae60", label: "Very Strong" },
        ];

        const level = levels[Math.min(strength, 5)];
        fill.style.width = level.pct;
        fill.style.background = level.color;
        text.textContent = level.label;
      }

      async function resetPassword() {
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const btn = document.getElementById("submitBtn");
        const msgEl = document.getElementById("message");

        msgEl.className = "message";
        msgEl.textContent = "";

        if (!newPassword || !confirmPassword) {
          msgEl.className = "message error";
          msgEl.textContent = "❌ Please fill in both fields.";
          return;
        }

        if (newPassword.length < 6) {
          msgEl.className = "message error";
          msgEl.textContent = "❌ Password must be at least 6 characters.";
          return;
        }

        if (newPassword !== confirmPassword) {
          msgEl.className = "message error";
          msgEl.textContent = "❌ Passwords do not match.";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Resetting...";

        try {
          const res = await fetch(`/admin/reset-password/${token}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ newPassword }),
          });

          const result = await res.json();

          if (result.success) {
            msgEl.className = "message success";
            msgEl.textContent = "✅ " + result.message;
            btn.textContent = "Done!";
            // Redirect to login after 2.5 seconds
            setTimeout(() => { window.location.href = "login.html"; }, 2500);
          } else {
            msgEl.className = "message error";
            msgEl.textContent = "❌ " + (result.message || "Reset failed.");
            btn.disabled = false;
            btn.textContent = "Reset Password";
          }
        } catch (err) {
          msgEl.className = "message error";
          msgEl.textContent = "❌ Server error. Please try again.";
          btn.disabled = false;
          btn.textContent = "Reset Password";
        }
      }
    </script>
  </body>
</html>
